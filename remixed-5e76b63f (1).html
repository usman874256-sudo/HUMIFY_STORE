<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HUMIfy Store Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --accent: #ffffff;
    --accent-glow: rgba(255,255,255,0.06);
    --text: #f0f0f0;
    --text-muted: #777777;
    --text-dim: #333333;
    --user-bubble: #ffffff;
    --bot-bubble: #1a1a1a;
    --success: #22c55e;
    --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    --font-mono: 'Courier New', Courier, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 680px;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  }

  /* Header */
  .header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-wrap {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 6px;
  }

  .logo-wrap svg { width: 100%; height: 100%; }

  .header-info { flex: 1; }
  .header-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .header-name span { font-weight: 400; }
  .header-status {
    font-size: 11px;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.35; }
  }

  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

  .date-divider {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-divider::before,.date-divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  .msg-row {
    display: flex;
    gap: 10px;
    animation: msgIn 0.22s ease;
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(7px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }
  .msg-avatar.bot {
    background: #111;
    padding: 5px;
  }
  .msg-avatar.bot svg { width: 100%; height: 100%; }
  .msg-avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
  }

  .msg-body { max-width: 76%; display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--user-bubble);
    color: #111;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    padding: 0 2px;
  }

  /* Typing */
  .typing-bubble {
    display: none;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    width: fit-content;
  }
  .typing-bubble.visible { display: flex; gap: 4px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); opacity:0.4; }
    40%          { transform:translateY(-5px); opacity:1; }
  }

  /* Suggestions */
  .suggestions {
    padding: 0 16px 10px;
    display: flex; gap: 8px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestion-chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #ddd;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 11.5px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-main);
    white-space: nowrap;
  }
  .suggestion-chip:hover {
    border-color: #111;
    color: #111;
    background: var(--surface2);
  }

  /* Input */
  .input-area {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px 8px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: #aaa; }

  #user-input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 100px; min-height: 22px;
  }
  #user-input::placeholder { color: var(--text-muted); }

  .send-btn { background: #ffffff; }
  .send-btn:hover { background: #dddddd; }
  .send-btn svg { fill: #111; }

  .char-count {
    text-align: right;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 2px 0;
    font-family: var(--font-mono);
  }

  /* Powered by */
  .powered {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 0 4px;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <!-- Shopping bag SVG logo matching HUMIfy brand -->
    <div class="logo-wrap">
      <svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Bag -->
        <path d="M4 14C4 12.9 4.9 12 6 12H34C35.1 12 36 12.9 36 14L38 40C38 41.1 37.1 42 36 42H4C2.9 42 2 41.1 2 40L4 14Z" fill="white"/>
        <!-- Handle -->
        <path d="M14 12C14 7.6 16.7 4 20 4C23.3 4 26 7.6 26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Cart icon inside bag -->
        <path d="M11 20h2l2.5 8h8l2-6H13.5" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="18" cy="30" r="1.1" fill="#111"/>
        <circle cx="23" cy="30" r="1.1" fill="#111"/>
      </svg>
    </div>

    <div class="header-info">
      <div class="header-name">HUMIfy <span>STORE</span></div>
      <div class="header-status">
        <span class="status-dot"></span>
        Online — here to help you shop
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 4h10M5 4V2.5a.5.5 0 01.5-.5h5a.5.5 0 01.5.5V4M6 7v4M10 7v4M4 4l.5 8a1 1 0 001 1h5a1 1 0 001-1L12 4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="date-divider">Today</div>
    <div class="msg-row">
      <div class="msg-avatar bot">
        <svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14C4 12.9 4.9 12 6 12H34C35.1 12 36 12.9 36 14L38 40C38 41.1 37.1 42 36 42H4C2.9 42 2 41.1 2 40L4 14Z" fill="white"/>
          <path d="M14 12C14 7.6 16.7 4 20 4C23.3 4 26 7.6 26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M11 20h2l2.5 8h8l2-6H13.5" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="18" cy="30" r="1.1" fill="#111"/>
          <circle cx="23" cy="30" r="1.1" fill="#111"/>
        </svg>
      </div>
      <div class="msg-body">
        <div class="bubble bot">Welcome to <strong>HUMIfy Store</strong>! 🛍️ I'm your shopping assistant. Ask me about products, orders, or anything else — I'm here to help!</div>
        <span class="msg-time" id="init-time"></span>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div style="padding: 0 16px 8px; flex-shrink:0;">
    <div class="msg-row" id="typing-row" style="display:none;">
      <div class="msg-avatar bot">
        <svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14C4 12.9 4.9 12 6 12H34C35.1 12 36 12.9 36 14L38 40C38 41.1 37.1 42 36 42H4C2.9 42 2 41.1 2 40L4 14Z" fill="white"/>
          <path d="M14 12C14 7.6 16.7 4 20 4C23.3 4 26 7.6 26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M11 20h2l2.5 8h8l2-6H13.5" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="18" cy="30" r="1.1" fill="#111"/>
          <circle cx="23" cy="30" r="1.1" fill="#111"/>
        </svg>
      </div>
      <div class="msg-body">
        <div class="typing-bubble visible">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Track my order 📦</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What's on sale? 🏷️</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Return policy 🔄</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Ask HUMIfy Store anything…" maxlength="500"
        oninput="autoResize(this); updateChar(this)"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 16 16" fill="white">
          <path d="M1.5 1.5l13 6.5-13 6.5V10l9-2-9-2V1.5z"/>
        </svg>
      </button>
    </div>
    <div class="char-count" id="char-count">0 / 500</div>
  </div>
  <div class="powered">Powered by Claude AI</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</div>

<script>
const API_KEY = "";
const MODEL   = "claude-sonnet-4-20250514";
const SYSTEM  = "You are a friendly and helpful shopping assistant for HUMIfy Store. Help customers with product questions, orders, recommendations, and any store-related inquiries. Be warm, concise, and enthusiastic about helping shoppers. Use a friendly tone and keep responses clear and short. Sign off with HUMIfy Store branding when appropriate.";

// EmailJS config
const EMAILJS_SERVICE_ID  = "buhsamjsm";
const EMAILJS_TEMPLATE_ID = "template_csg5qit";
const EMAILJS_PUBLIC_KEY  = "aS2c2ZUeJEbcfxM8-";

emailjs.init(EMAILJS_PUBLIC_KEY);

let history = [];

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
document.getElementById('init-time').textContent = getTime();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function updateChar(el) {
  document.getElementById('char-count').textContent = el.value.length + ' / 500';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendSuggestion(btn) {
  document.getElementById('user-input').value = btn.textContent.replace(/[📦🏷️🔄]/g,'').trim();
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

const bagSVG = `<svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 14C4 12.9 4.9 12 6 12H34C35.1 12 36 12.9 36 14L38 40C38 41.1 37.1 42 36 42H4C2.9 42 2 41.1 2 40L4 14Z" fill="white"/>
  <path d="M14 12C14 7.6 16.7 4 20 4C23.3 4 26 7.6 26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M11 20h2l2.5 8h8l2-6H13.5" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="18" cy="30" r="1.1" fill="#111"/>
  <circle cx="23" cy="30" r="1.1" fill="#111"/>
</svg>`;

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');

  const avEl = document.createElement('div');
  avEl.className = 'msg-avatar ' + (role === 'user' ? 'user-av' : 'bot');
  if (role === 'user') avEl.textContent = '👤';
  else avEl.innerHTML = bagSVG;

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  bubble.textContent = text;

  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = getTime();

  body.appendChild(bubble);
  body.appendChild(time);
  row.appendChild(avEl);
  row.appendChild(body);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typing-row').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('messages').scrollTop = 999999;
}

function clearChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="date-divider">Today</div>';
  const row = document.createElement('div');
  row.className = 'msg-row';
  const avEl = document.createElement('div');
  avEl.className = 'msg-avatar bot';
  avEl.innerHTML = bagSVG;
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.innerHTML = `<div class="bubble bot">Chat cleared! How can I help you at <strong>HUMIfy Store</strong> today? 🛍️</div><span class="msg-time">${getTime()}</span>`;
  row.appendChild(avEl);
  row.appendChild(body);
  msgs.appendChild(row);
  document.getElementById('suggestions').style.display = 'flex';
}

async function sendEmailNotification(userMsg, botReply) {
  try {
    const result = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: "usman874256@gmail.com",
      to_name: "Usman Shaheen",
      from_name: "HUMIfy Store Chatbot",
      reply_to: "usman874256@gmail.com",
      subject: "New Customer Chat - HUMIfy Store",
      message: "Customer Message: " + userMsg + "\n\nBot Reply: " + botReply + "\n\nTime: " + new Date().toLocaleString()
    });
    console.log("Email sent!", result.status);
  } catch (err) {
    // Log detailed error
    console.error("EmailJS error details:", JSON.stringify(err));
    console.error("Status:", err.status, "Text:", err.text);
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  updateChar(input);
  document.getElementById('suggestions').style.display = 'none';

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping(true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({ model: MODEL, max_tokens: 1000, system: SYSTEM, messages: history })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    showTyping(false);
    addMessage('bot', reply);

    // Send email notification
    await sendEmailNotification(text, reply);

  } catch (err) {
    showTyping(false);
    addMessage('bot', '⚠️ ' + (err.message || 'Something went wrong. Please try again.'));
  }
}
</script>
</body>
</html>
